# Evolution settings
max_iterations: 5
checkpoint_interval: 1
parallel_evaluations: 1

# LLM configuration
llm:
  api_base: "https://api.openai.com/v1"  # Or your LLM provider
  models:
    - name: "gpt-5-mini"
      weight: 1.0
  evaluator_models:
    - name: "gpt-5.2"
      weight: 1.0
  temperature: 0.7
  max_tokens: 14000
  timeout: 120
  api_key:

# Database configuration (MAP-Elites algorithm)
database:
  population_size: 40
  num_islands: 5
  migration_interval: 40
  feature_dimensions:  # MUST be a list, not an integer
    - "performance"
    - "correctness"
    - "efficiency"
    - "answer_closeness"
    - "robustness"
    - "creativity"

# Evaluation settings
evaluator:
  timeout: 360
  max_retries: 3
  cascade_evaluation: false            # Use cascade evaluation to filter bad solutions early

problem:
  "number": 250
  "title": "Select Four Words"
  "text": "BE\n        OAK\n        ROOM\n        IDEAL\n        SCHOOL\n        KITCHEN\n        OVERCOAT\n        REVOLVING\n        DEMOCRATIC\n        ENTERTAINER\n        MATHEMATICAL\n        SPORTSMANSHIP\n        KINDERGARTENER\n        INTERNATIONALLY\n        \n        The words run from 2 to 15 letters.\n    \n    - **Objective**: Choose four different words with a, b, c and d letters, such that a^2 = b * d and a * d = b^2 * c\n"
  "answer_text": "School, oak, overcoat, mathematical. Multiply the left and right sides of the given equations:\na^3*d = b^3*d*c, or a^3 = b^3*c\n   It follows that c must be a cube of an integer. The only cube from 2 through 15 is 8, so c = 8,\nand a^3 = 8*b^3, or a = 2*b.\n   Substituting in the first given equation, 4*b^2 = b*d, or 4*b = d. In the given range of numbers, b\nmust equal 2 or 3, and d must equal 8 or 12. Since c already is 8, d is 12 and b is 3. Then a - 2*b = 6.\n"
  "images": []
  "answer_images": []

# Prompt configuration
prompt:
  system_message: |
    You are a participant in a mathematical and logical puzzle competition. 
    You like solving the puzzles in a creative and efficient way, similar to how a human would solve them. 
    Of course, you need to make sure tha the solution provides the correct answer, but you also want to find a solution that is elegant and efficient.
    You will be evaluated on the correctness of your solution, but also on the creativity, efficiency and robustness of your solution.
    You are not just trying to find any solution, but the best solution that you can find.
    Your task is to improve on the provided solution. 
    Your goal is to find an efficient algorithm that can find the solution in fewer steps. 
    For example, if the solution uses a brute-force approach, try to find a more clever way to solve the problem. 
    Another metric is time complexity of the algorithm. The best solution will be the one that can find the solution in the least amount of time and with the least amount of computational resources.
    Your program should always read/write to STDIN/STDOUT. For example, to handle integer input, use the following format:
    ```
    import sys
    for line in sys.stdin:
        data = int(line)
    ```
    Use print() for output. For example:
    ```
    print("Hello, World!")
    ```
    
    Here is the puzzle you need to solve:
        BE
        OAK
        ROOM
        IDEAL
        SCHOOL
        KITCHEN
        OVERCOAT
        REVOLVING
        DEMOCRATIC
        ENTERTAINER
        MATHEMATICAL
        SPORTSMANSHIP
        KINDERGARTENER
        INTERNATIONALLY
        
        The words run from 2 to 15 letters.
    
    - **Objective**: Choose four different words with a, b, c and d letters, such that a^2 = b * d and a * d = b^2 * c

  num_top_programs: 3
  num_diverse_programs: 2

# Logging
log_level: "INFO"
