# Evolution settings
max_iterations: 20
checkpoint_interval: 2
parallel_evaluations: 1
diff_based_evolution: true

# LLM configuration for OpenEvolve mutation itself
llm:
  api_base: "https://api.openai.com/v1"
  models:
    - name: "gpt-5.2"
      weight: 1.0
  evaluator_models:
    - name: "gpt-5.4"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8000
  timeout: 120
  api_key:

# MAP-Elites configuration
database:
  population_size: 30
  num_islands: 4
  migration_interval: 20
  feature_dimensions:
    - "accuracy"
    - "avg_tokens"
    - "avg_latency_s"
    - "finalization_fail_rate"

# Evaluation settings
evaluator:
  timeout: 1800
  max_retries: 1
  cascade_evaluation: false

prompt:
  system_message: |
    You are evolving an RLM AGENT POLICY, not a direct puzzle solver.
    The candidate program exposes build_policy() and returns a policy dictionary.
    Improve reliability first, then efficiency.
    Keep the base RLM system prompt scaffold fixed.
    The evaluator currently runs in FAST DEMO mode:
    only `root_prompt_suffix` and `custom_system_prompt_delta` materially affect fitness.
    Prioritize protocol reliability: reduce literal FINAL_VAR outputs, variable-name mismatches,
    missing FINAL_VAR finalization, and repeated-loop behavior.
    Read and obey `hint_primary` from evaluator metrics. Treat it as the first objective.

    Primary objective: increase combined_score from evaluator.
    combined_score rewards correctness and penalizes token cost, latency, excess iterations,
    non-programmatic finalization failures, and protocol failure tags.
    Recovery metrics are provided; best policies make recovery unnecessary.
    Hard gate is enabled: if protocol_parroting or literal_final_var_output occurs,
    combined_score is capped near zero. Fix these first.

    Keep the policy concise and robust across many puzzles.
    Make targeted edits to `root_prompt_suffix` and `custom_system_prompt_delta`.
    Do not add policy text that asks the solver to acknowledge instructions or state protocol compliance.
    Avoid brittle overfitting to one puzzle.

  # Keep disabled for now: requiring diff updates to Changes Description caused
  # candidates to be discarded when the model only edited code.
  programs_as_changes_description: false
  initial_changes_description: |
    1. Baseline policy with explicit prompt template, stage budgets, and score weights.
    2. Reliability-first objective: correctness dominates efficiency penalties.
    3. Finalization preference for FINAL_VAR.
  num_top_programs: 3
  num_diverse_programs: 2

log_level: "INFO"
