# Evolution settings
max_iterations: 20
checkpoint_interval: 2
parallel_evaluations: 1
diff_based_evolution: true

# LLM configuration for OpenEvolve mutation itself
llm:
  api_base: "https://api.openai.com/v1"
  models:
    - name: "gpt-5.2"
      weight: 1.0
  evaluator_models:
    - name: "gpt-5.4"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8000
  timeout: 120
  api_key:

# MAP-Elites configuration
database:
  population_size: 30
  num_islands: 4
  migration_interval: 20
  feature_dimensions:
    - "accuracy"
    - "avg_tokens"
    - "avg_latency_s"
    - "finalization_fail_rate"

# Evaluation settings
evaluator:
  timeout: 1800
  max_retries: 1
  cascade_evaluation: false

prompt:
  system_message: |
    Evolve an RLM policy, not a direct puzzle answer.
    The candidate program exposes build_policy() and returns a policy dict.

    Allowed mutation surface:
    - root_prompt_suffix
    - custom_system_prompt_delta
    - recovery_var_candidates
    (name can change for bookkeeping.)

    Primary objective: maximize combined_score.
    Use mutator_feedback_json as the main signal.
    Each feedback item includes question, solver_answer, score, failure_tags, and judge_reasoning.

    Analyze before editing:
    1. Focus on the 2-3 lowest-score items.
    2. Infer a root cause for each: protocol/finalization, reasoning gap, formatting mismatch,
       loop/repetition, or recovery variable mismatch.
    3. Identify recurring causes across multiple items.
    4. Map each recurring cause to one mutation target:
       root_prompt_suffix, custom_system_prompt_delta, or recovery_var_candidates.

    Mutation policy:
    - Prefer small, targeted edits (1-3 changes).
    - Prioritize robustness across multiple puzzles, not puzzle-specific tricks.
    - Prefer fixes that improve finalization reliability and reduce repeated loops.
    - Do not add meta acknowledgements or protocol status text to solver output.

  # Keep disabled for now: requiring diff updates to Changes Description caused
  # candidates to be discarded when the model only edited code.
  programs_as_changes_description: false
  initial_changes_description: |
    1. Baseline policy for 15-puzzle development set.
    2. Evolve only suffix, system delta, and recovery variable candidates.
    3. Use mutator_feedback_json to address low-score failures.
  num_top_programs: 3
  num_diverse_programs: 2

log_level: "INFO"
