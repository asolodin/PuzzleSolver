# Evolution settings
max_iterations: 20
checkpoint_interval: 2
parallel_evaluations: 1
diff_based_evolution: true

# LLM configuration for OpenEvolve mutation itself
llm:
  api_base: "https://api.openai.com/v1"
  models:
    - name: "gpt-5.2"
      weight: 1.0
      reasoning_effort: "high"
  evaluator_models:
    - name: "gpt-5.4"
      weight: 1.0
  temperature: 0.7
  max_tokens: 8000
  timeout: 120
  api_key:

# MAP-Elites configuration
database:
  population_size: 30
  num_islands: 4
  migration_interval: 20
  feature_dimensions:
    - "accuracy"
    - "avg_tokens"
    - "avg_latency_s"
    - "avg_iterations"

# Evaluation settings
evaluator:
  timeout: 1800
  max_retries: 1
  cascade_evaluation: false

prompt:
  system_message: |
    Evolve an RLM policy, not a direct puzzle answer.
    The candidate program exposes build_policy() and returns a policy dict.

    Allowed mutation surface:
    - root_prompt_suffix
    - custom_system_prompt_delta
    (name can change for bookkeeping only.)

    Primary objective: maximize combined_score.
    Use mutator_feedback_json as the main signal.
    Each feedback item includes:
    - question
    - rlm_answer
    - rlm_final_turn_response
    - judge (is_correct, correctness, answer_closeness, failure_type, reasoning)
    - run_metrics

    Analyze before editing:
    1. Focus on the 2-3 lowest-score items first.
    2. Infer a root cause for each failure from the full RLM response and judge reasoning.
    3. Identify recurring causes across multiple puzzles.
    4. Map each recurring cause to one mutation target:
       root_prompt_suffix or custom_system_prompt_delta.

    Heuristic examples of guidance for mutations (when reasoning quality is weak):
    - Instruct solver to try a simpler version of the problem first.
    - Instruct solver to extract defining features/constraints explicitly.
    - Instruct solver to list relevant equations or invariants.
    - Instruct solver to look for symmetry/conservation structure.
    - Instruct solver to compute at least one concrete quantity to build intuition.
    - Instruct solver to run a small simulation/check when feasible.

    Mutation policy:
    - Prefer small, targeted edits (1-3 changes per iteration).
    - Prioritize robustness across multiple puzzles, not puzzle-specific tricks.
    - Prefer edits that make the solver use computation/checks instead of immediate unsupported guesses.
    - Do not add meta acknowledgements or protocol status text to solver output.

  # Keep disabled for now: requiring diff updates to Changes Description caused
  # candidates to be discarded when the model only edited code.
  programs_as_changes_description: false
  initial_changes_description: |
    1. Baseline policy for 15-puzzle development set.
    2. Evolve only suffix and system delta.
    3. Use mutator_feedback_json to address low-score failures.
  num_top_programs: 3
  num_diverse_programs: 2

log_level: "INFO"
